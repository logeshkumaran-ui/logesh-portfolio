<div class="section-divider" id="education">
    <div class="container">
        <header class="section-heading text-center mb-3">
            <h3>Education</h3>
        </header>
        <div class="row">
            <div class="col-12">
                <mat-card class="shadow-sm rounded-2 border border-light-subtle mb-3"
                    *ngFor="let education of educations" data-aos="fade-up" data-aos-delay="100" data-aos-duration="500"
                    data-aos-anchor-placement="top-center">
                    <mat-card-content>
                        <div class="row">
                            <div class="col-12 col-lg-3 col-md-3 d-flex flex-column justify-content-center align-items-center"
                                data-aos="slide-right" data-aos-delay="300" data-aos-duration="500"
                                data-aos-anchor-placement="top-center">
                                <img src="{{education.coverpic}}" alt="education image" class="education-img shadow-sm">
                            </div>
                            <div class="col-12 col-lg-9 col-md-3" data-aos="slide-left" data-aos-delay="300"
                                data-aos-duration="500" data-aos-anchor-placement="top-center">
                                <h3 class="text-mat-primary">{{education.degree}}</h3>
                                <h5 class="text-mat-primary">{{education.fieldofstudy}}</h5>
                                <p>{{education.period}}</p>
                                <p>{{education.school}}</p>
                            </div>
                        </div>
                    </mat-card-content>
                </mat-card>
            </div>
        </div>
    </div>
</div>
